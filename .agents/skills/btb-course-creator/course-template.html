<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course | {COURSE_TITLE}</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap');

        :root {
            --bg-content: #ffffff;
            --text-main: #4a4a4a;
            --text-dark: #3F4A3C;
            --accent-green: #6B8063;
            --accent-light: #f7f4ef;
            --accent-sage: #A8B5A2;
            --accent-rose: #cbb4af;
            --border-light: #e8ddd4;
        }

        body {
            font-family: 'Lato', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4ee 0%, #e8ddd4 50%, #e8c4c4 100%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.8;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* ═══ MASTHEAD & PROGRESS ═══ */
        .masthead {
            background-color: var(--bg-content);
            padding: 40px 20px 20px;
            text-align: center;
            border-bottom: 2px solid var(--border-light);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .masthead-title {
            font-family: 'Playfair Display', Georgia, serif;
            color: var(--text-dark);
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .progress-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #e0e0e0;
            transition: all 0.4s ease;
            cursor: pointer;
        }

        .progress-dot.active { background-color: var(--accent-green); transform: scale(1.3); }
        .progress-dot.completed { background-color: var(--accent-sage); }
        .progress-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-sage); margin-top: 10px; display: block; }

        /* ═══ MAIN READING CONTAINER ═══ */
        .course-container {
            max-width: 680px;
            margin: 60px auto 100px;
            background-color: var(--bg-content);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            min-height: 600px;
        }

        /* ═══ LESSON SECTIONS ═══ */
        .lesson-section { padding: 60px 50px; display: none; opacity: 0; transition: opacity 0.6s ease; }
        .lesson-section.active { display: block; opacity: 1; animation: fadeIn 0.8s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-family: 'Playfair Display', Georgia, serif; color: var(--text-dark); font-size: 32px; font-weight: 600; margin: 0 0 30px 0; line-height: 1.3; text-align: center; }
        h2 { font-family: 'Playfair Display', Georgia, serif; color: var(--accent-green); font-size: 22px; font-weight: 600; margin: 40px 0 15px 0; }
        h3 { font-family: 'Playfair Display', Georgia, serif; color: var(--accent-sage); font-size: 18px; font-weight: 400; font-style: italic; margin: 0 0 10px 0; }
        p { margin-bottom: 20px; font-size: 17px; }
        strong { color: var(--text-dark); font-weight: 700; }
        em { font-style: italic; color: var(--accent-green); }

        .quote-block { background-color: var(--accent-light); border-left: 3px solid var(--accent-sage); padding: 25px 30px; margin: 35px 0; font-family: 'Playfair Display', Georgia, serif; font-size: 19px; font-style: italic; color: var(--text-dark); }
        .hero-image { width: 100%; height: auto; border-radius: 6px; margin-bottom: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

        .media-player-box { background-color: var(--accent-light); border: 1px solid var(--border-light); border-radius: 6px; padding: 35px; margin: 40px 0; text-align: center; }
        .media-player-box .label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-sage); margin-bottom: 15px; display: block; }
        audio, video { width: 100%; outline: none; border-radius: 4px; }
        audio::-webkit-media-controls-enclosure { background-color: var(--bg-content); }
        video { background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        .pdf-box { background-color: var(--accent-light); border-radius: 6px; padding: 40px 30px; text-align: center; margin: 40px 0; border-top: 3px solid var(--accent-sage); }
        .btn-download { display: inline-block; padding: 14px 35px; background-color: var(--accent-green); color: #ffffff; text-decoration: none; border-radius: 4px; font-size: 16px; letter-spacing: 1px; margin-top: 15px; transition: background 0.3s; }
        .btn-download:hover { background-color: #556b2f; }

        .lesson-nav { margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: none; border: none; color: var(--accent-sage); font-family: 'Lato', sans-serif; font-size: 15px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: color 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-nav:hover { color: var(--accent-green); }
        .btn-nav.disabled { opacity: 0; pointer-events: none; }

        .btn-primary { background-color: var(--accent-green); color: white; padding: 16px 40px; border-radius: 4px; border: none; font-family: 'Lato', sans-serif; font-size: 16px; letter-spacing: 1px; cursor: pointer; transition: background 0.3s; }
        .btn-primary:hover { background-color: #556b2f; }

        .course-footer { text-align: center; padding: 40px 20px; font-size: 12px; color: var(--text-dark); letter-spacing: 1px; opacity: 0.7; }

        @media (max-width: 600px) {
            .lesson-section { padding: 40px 25px; }
            h1 { font-size: 28px; }
            .course-container { margin: 20px 15px; }
        }
    </style>
</head>
<body>

    <header class="masthead">
        <div class="masthead-title">{COURSE_TITLE}</div>
        <div class="progress-container" id="progress-dots"></div>
        <span class="progress-label" id="progress-text">Part 1 of {TOTAL_LESSONS}</span>
    </header>

    <div class="course-container" id="course-container">
        
        <!-- MODULE 1 TEMPLATE -->
        <div class="lesson-section" id="lesson-1">
            <img src="assets/{IMAGE_FILE}" class="hero-image" alt="Thumbnail">
            <h1>{LESSON_1_TITLE}</h1>
            
            <p>{LESSON_CONTENT_HTML}</p>

            <div class="lesson-nav">
                <button class="btn-nav disabled">← Previous</button>
                <button class="btn-primary" onclick="goToLesson(2)">{NEXT_BUTTON_TEXT} →</button>
            </div>
        </div>

        <!-- MODULE 2 TEMPLATE ... Repeat structure as necessary for chapters -->

    </div>

    <div class="course-footer">BEYOND THE BEND YOGA &nbsp;&middot;&nbsp; RISING MOON STUDIO</div>

    <script>
        // Update totalLessons dynamically when generating the actual course file
        const totalLessons = {TOTAL_LESSONS_COUNT};
        let currentLesson = 1;

        function initProgressDots() {
            const container = document.getElementById('progress-dots');
            for(let i=1; i<=totalLessons; i++) {
                const dot = document.createElement('div');
                dot.className = 'progress-dot';
                dot.onclick = () => goToLesson(i);
                container.appendChild(dot);
            }
        }

        function goToLesson(lessonNumber) {
            document.querySelectorAll('audio, video').forEach(media => {
                media.pause(); media.currentTime = 0;
            });

            const oldSection = document.getElementById('lesson-' + currentLesson);
            if(oldSection) oldSection.classList.remove('active');

            currentLesson = lessonNumber;
            const newSection = document.getElementById('lesson-' + currentLesson);
            
            if (newSection) {
                setTimeout(() => {
                    newSection.classList.add('active');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }, 50);
            }

            document.getElementById('progress-text').innerText = "Part " + currentLesson + " of " + totalLessons;
            
            const dots = document.querySelectorAll('.progress-dot');
            dots.forEach((dot, index) => {
                if (index + 1 === currentLesson) dot.className = 'progress-dot active';
                else if (index + 1 < currentLesson) dot.className = 'progress-dot completed';
                else dot.className = 'progress-dot';
            });
        }

        initProgressDots();
        goToLesson(1);
    </script>
</body>
</html>
